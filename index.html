<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Memory Monitor</title>

<style>
:root{ --green:#00ff88; }

html,body{
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:monospace;
  color:var(--green);
}

/* selector */
.selector{
  position:fixed;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(0,255,136,0.3);
  padding:6px 10px;
  font-size:12px;
  cursor:pointer;
  text-shadow:0 0 6px var(--green);
}

.selector select{
  background:black;
  color:var(--green);
  border:none;
  font-family:monospace;
}

/* subtitles */
.sub{
  position:fixed;
  bottom:32px;
  left:50%;
  transform:translateX(-50%);
  width:min(90vw,520px);
  text-align:center;
  font-size:14px;
  line-height:1.5;
  white-space:pre-wrap;
  text-shadow:0 0 8px var(--green);
}

/* canvas */
canvas{
  position:fixed;
  inset:0;
}
</style>
</head>

<body>

<div class="selector">
  Track:
  <select id="trackSelect"></select>
</div>

<canvas id="c"></canvas>
<div class="sub" id="sub"></div>

<audio id="audio" preload="auto"></audio>

<script>
const tracks = [
  {
    name: "Foreclosing the Future",
    audio: "The_physics_of_foreclosing_the_future.mp3",
    vtt: "The_physics_of_foreclosing_the_future.vtt"
  },
  {
    name: "Universal Memory",
    audio: "The_Physics_of_Universal_Memory.mp3",
    vtt: "The_Physics_of_Universal_Memory.vtt"
  }
]

const audio = document.getElementById('audio')
const subEl = document.getElementById('sub')
const select = document.getElementById('trackSelect')

let ctxA, analyser, buf

function initAudio(){
  if(ctxA) return
  ctxA = new (window.AudioContext||window.webkitAudioContext)()
  analyser = ctxA.createAnalyser()
  analyser.fftSize = 1024
  buf = new Uint8Array(analyser.fftSize)

  const src = ctxA.createMediaElementSource(audio)
  src.connect(analyser)
  analyser.connect(ctxA.destination)
}

/* populate dropdown */
tracks.forEach((t,i)=>{
  const opt = document.createElement('option')
  opt.value = i
  opt.textContent = t.name
  select.appendChild(opt)
})

/* load track */
function loadTrack(i){
  const t = tracks[i]

  audio.innerHTML = `
    <source src="${t.audio}" type="audio/mpeg">
    <track src="${t.vtt}" kind="subtitles" default>
  `

  audio.load()
}

/* default = NEW FILE */
loadTrack(0)

/* change track */
select.onchange = ()=>{
  audio.pause()
  loadTrack(select.value)
}

/* click anywhere to play */
document.body.onclick = async ()=>{
  initAudio()

  if(ctxA && ctxA.state !== "running"){
    await ctxA.resume()
  }

  if(audio.paused){
    await audio.play()
  } else {
    audio.pause()
  }
}

/* prevent selector clicks from toggling audio */
select.onclick = e => e.stopPropagation()

/* subtitles */
audio.ontimeupdate = ()=>{
  const tt = audio.textTracks && audio.textTracks[0]
  if(!tt) return

  if(tt.mode !== "hidden") tt.mode = "hidden"

  const cue = tt.activeCues && tt.activeCues[0]
  subEl.textContent = cue ? cue.text : ''
}

/* canvas */
const c = document.getElementById('c')
const g = c.getContext('2d')

let w,h,cx,cy
function resize(){
  w=c.width=innerWidth
  h=c.height=innerHeight
  cx=w/2; cy=h/2
}
resize()
addEventListener('resize',resize)

function draw(){
  g.fillStyle='rgba(0,0,0,0.12)'
  g.fillRect(0,0,w,h)

  const R = Math.min(w,h)*0.38

  if(analyser){
    analyser.getByteTimeDomainData(buf)

    const len=buf.length
    const lag=20

    g.beginPath()
    for(let i=0;i<len;i++){
      const a=(buf[i]-128)/128
      const b=(buf[(i+lag)%len]-128)/128
      const t=i/len*Math.PI*2

      const x = cx + Math.sin(t*2)*a*R*0.7
      const y = cy + Math.sin(t*3)*b*R*0.7

      i ? g.lineTo(x,y) : g.moveTo(x,y)
    }

    g.strokeStyle = '#00ff88'
    g.shadowColor = '#00ff88'
    g.shadowBlur = 12
    g.stroke()
    g.shadowBlur = 0
  }

  requestAnimationFrame(draw)
}

draw()
</script>

</body>
</html>
