<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Memory Monitor</title>

<style>
:root{ --green:#00ff88; }

html,body{
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:monospace;
  color:var(--green);
}

/* CRT scanlines */
body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.04) 0,
    rgba(255,255,255,0.04) 1px,
    transparent 2px,
    transparent 4px
  );
  opacity:.15;
}

canvas{
  position:fixed;
  inset:0;
}

/* subtitles */
.sub{
  position:fixed;
  bottom:32px;
  left:50%;
  transform:translateX(-50%);
  width:min(90vw,520px);
  text-align:center;
  font-size:14px;
  line-height:1.5;
  word-wrap:break-word;
  white-space:pre-wrap;
  text-shadow:0 0 8px var(--green);
  padding:0 10px;
  user-select:none;
}

/* essay link */
.essay-link{
  position:fixed;
  bottom:6px;
  left:50%;
  transform:translateX(-50%);
  width:min(90vw,520px);

  text-align:center;
  font-size:12px;
  line-height:1.4;

  color:var(--green);
  text-decoration:none;

  border-top:1px solid rgba(0,255,136,0.25);
  padding-top:6px;

  opacity:0.75;
  text-shadow:0 0 6px var(--green);
  user-select:none;

  transition:opacity 0.6s ease;
}

/* fade state */
.essay-link.fade-out{
  opacity:0.05;
}

.essay-link:hover{
  opacity:1;
  color:#baffea;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="sub" id="sub"></div>

<a class="essay-link"
   href="https://standardgalactic.github.io/calculus/kernel-memory.pdf"
   target="_blank">
  Kernel Operators, Memory, and Field-Theoretic Dynamics
</a>

<audio id="audio" preload="auto">
  <source src="The_Physics_of_Universal_Memory.mp3" type="audio/mpeg">
  <track src="The_Physics_of_Universal_Memory.vtt" kind="subtitles" default>
</audio>

<script>
const audio = document.getElementById('audio')
const subEl = document.getElementById('sub')
const link = document.querySelector('.essay-link')

/* audio context */
let ctxA, analyser, buf

function initAudio(){
  if(ctxA) return

  ctxA = new (window.AudioContext||window.webkitAudioContext)()

  analyser = ctxA.createAnalyser()
  analyser.fftSize = 1024
  buf = new Uint8Array(analyser.fftSize)

  const src = ctxA.createMediaElementSource(audio)
  src.connect(analyser)
  analyser.connect(ctxA.destination)
}

/* fade logic */
let fadeTimer = null

function showLinkTemporarily(){
  clearTimeout(fadeTimer)
  link.classList.remove('fade-out')

  fadeTimer = setTimeout(()=>{
    if(!audio.paused){
      link.classList.add('fade-out')
    }
  }, 8000)
}

/* click anywhere */
document.body.onclick = async ()=>{
  initAudio()

  if(ctxA && ctxA.state !== "running"){
    await ctxA.resume()
  }

  if(audio.paused){
    await audio.play()
    showLinkTemporarily()
  } else {
    audio.pause()
    link.classList.remove('fade-out')
  }
}

/* prevent link click from toggling audio */
link.onclick = e=>{
  e.stopPropagation()
}

/* subtitles */
audio.ontimeupdate = ()=>{
  const tt = audio.textTracks && audio.textTracks[0]
  if(!tt) return

  if(tt.mode !== "hidden") tt.mode = "hidden"

  const cue = tt.activeCues && tt.activeCues[0]
  subEl.textContent = cue ? cue.text : ''
}

/* canvas */
const c = document.getElementById('c')
const g = c.getContext('2d')

let w,h,cx,cy
function resize(){
  w=c.width=innerWidth
  h=c.height=innerHeight
  cx=w/2; cy=h/2
}
resize()
addEventListener('resize',resize)

/* decorative rings */
let r1=0,r2=0,r3=0

function ring(r,rot,ticks,alpha){
  g.save()
  g.translate(cx,cy)
  g.rotate(rot)

  g.beginPath()
  g.arc(0,0,r,0,Math.PI*2)
  g.strokeStyle=`rgba(0,255,136,${alpha})`
  g.lineWidth=0.8
  g.stroke()

  for(let i=0;i<ticks;i++){
    const a=(i/ticks)*Math.PI*2
    g.beginPath()
    g.moveTo(Math.cos(a)*(r-4),Math.sin(a)*(r-4))
    g.lineTo(Math.cos(a)*(r+4),Math.sin(a)*(r+4))
    g.stroke()
  }

  g.restore()
}

/* draw */
function draw(){

  g.fillStyle='rgba(0,0,0,0.12)'
  g.fillRect(0,0,w,h)

  const R = Math.min(w,h)*0.38

  g.save()
  g.beginPath()
  g.arc(cx,cy,R,0,Math.PI*2)
  g.clip()

  if(analyser){
    analyser.getByteTimeDomainData(buf)

    const len=buf.length
    const lag=20

    g.beginPath()
    for(let i=0;i<len;i++){
      const a=(buf[i]-128)/128
      const b=(buf[(i+lag)%len]-128)/128
      const t=i/len*Math.PI*2

      const x = cx + Math.sin(t*2)*a*R*0.7
      const y = cy + Math.sin(t*3)*b*R*0.7

      i ? g.lineTo(x,y) : g.moveTo(x,y)
    }

    g.strokeStyle = '#00ff88'
    g.shadowColor = '#00ff88'
    g.shadowBlur = 12
    g.stroke()
    g.shadowBlur = 0
  }

  g.restore()

  g.beginPath()
  g.arc(cx,cy,R,0,Math.PI*2)
  g.strokeStyle='rgba(0,255,136,0.7)'
  g.lineWidth=1.5
  g.stroke()

  r1+=0.0008
  r2-=0.0012
  r3+=0.0018

  ring(R*0.72,r1,32,0.25)
  ring(R*0.54,r2,24,0.20)
  ring(R*0.36,r3,16,0.15)

  requestAnimationFrame(draw)
}

draw()
</script>

</body>
</html>
